<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0908" />

    <!-- Primary SEO -->
    <title>Beit Building Contractors | Roofing & Construction Orlando, FL</title>
    <meta name="description" content="Beit Building Contractors LLC provides roofing and construction services in Orlando and Central Florida. Roof replacement, repairs, storm damage, decks, painting & more. DBPR licensed, free estimates." />
    <meta name="keywords" content="roofing Orlando FL, construction company Orlando, roof replacement Orlando, roofing contractor Florida, Beit Building Contractors, general construction Orlando, storm damage roofing, residential roofing Orlando, commercial construction Florida" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Beit Building Contractors LLC" />
    <link rel="canonical" href="https://www.beitbuilding.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.beitbuilding.com/" />
    <meta property="og:title" content="Beit Building Contractors | Roofing & Construction Orlando, FL" />
    <meta property="og:description" content="Licensed roofing and construction services in Orlando and Central Florida. Roof replacement, repairs, storm damage, decks, painting & more." />
    <meta property="og:image" content="https://www.beitbuilding.com/og-image.jpg" />
    <meta property="og:image:alt" content="Beit Building Contractors — roofing and construction in Orlando" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:site_name" content="Beit Building Contractors" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Beit Building Contractors | Roofing & Construction Orlando, FL" />
    <meta name="twitter:description" content="Licensed roofing and construction services in Orlando and Central Florida. Free estimates." />
    <meta name="twitter:image" content="https://www.beitbuilding.com/og-image.jpg" />

    <!--
      Local Business Schema — STATIC FALLBACK for non-JS crawlers.
      The runtime version (mounted by <JsonLd id="local-business"> in App.tsx)
      replaces this content in-place with the richer @graph schema that
      adds Organization, Person (founder), WebSite, ImageObject, and the
      multi-type LocalBusiness + RoofingContractor + GeneralContractor.
      Both forms are valid Schema.org; Google + Bing reconcile them.
      Source of truth: src/data/business.ts + src/data/schemas/local-business.ts
    -->
    <script type="application/ld+json" data-jsonld-id="local-business">
    {
      "@context": "https://schema.org",
      "@type": ["LocalBusiness", "RoofingContractor", "GeneralContractor"],
      "name": "Beit Building Contractors LLC",
      "alternateName": ["BEIT BUILDING CONTRACTORS LLC", "FL Best Construction Company"],
      "url": "https://www.beitbuilding.com",
      "telephone": "+1-407-942-6459",
      "email": "beitbuilding@gmail.com",
      "image": "https://www.beitbuilding.com/og-image.jpg",
      "logo": "https://www.beitbuilding.com/logo-mark.png",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "2703 Dobbin Dr",
        "addressLocality": "Orlando",
        "addressRegion": "FL",
        "postalCode": "32817",
        "addressCountry": "US"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": 28.5383,
        "longitude": -81.3792
      },
      "areaServed": ["Orlando", "Winter Park", "Oviedo", "Kissimmee", "Sanford", "Orange County", "Seminole County", "Osceola County", "Central Florida"],
      "priceRange": "$$",
      "paymentAccepted": ["Cash", "Check", "Credit Card", "Debit Card", "ACH"],
      "currenciesAccepted": "USD",
      "knowsLanguage": ["en-US", "es"],
      "openingHoursSpecification": {
        "@type": "OpeningHoursSpecification",
        "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"],
        "opens": "07:00",
        "closes": "18:00"
      },
      "identifier": [
        { "@type": "PropertyValue", "propertyID": "Florida DBPR License", "name": "Certified Roofing Contractor", "value": "CCC1337413", "validThrough": "2026-08-31" },
        { "@type": "PropertyValue", "propertyID": "Florida DBPR License", "name": "Certified General Contractor", "value": "CGC1534077", "validThrough": "2026-08-31" }
      ],
      "sameAs": [],
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Construction & Roofing Services",
        "itemListElement": [
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Roofing Services", "description": "Complete roof replacement, repair, and storm damage restoration for residential and commercial properties." } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "General Construction", "description": "Full-scale residential and commercial construction from ground-up builds to major renovations." } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Deck & Fence Installation", "description": "Custom deck and fence design and installation using premium materials." } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Painting & Siding", "description": "Interior and exterior painting plus professional siding installation." } }
        ]
      }
    }
    </script>

    <link rel="icon" type="image/png" href="/logo-mark.png" />
    <link rel="apple-touch-icon" href="/logo-mark.png" />

    <!-- Tier 3 — preload critical above-the-fold assets so they're in
         flight before parser-blocking CSS finishes. The hero video poster
         (LCP-relevant) and the logo (in the hero crest) are the two
         critical-path image fetches. The hero video itself is not
         preloaded (11 MB; the autoplay default already prioritises it
         appropriately + a hard preload of that size is too aggressive). -->
    <link rel="preload" as="image" href="/images/house-1.jpg" fetchpriority="high" />
    <link rel="preload" as="image" href="/logo-mark.webp" type="image/webp" fetchpriority="high" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=Barlow:wght@300;400;500;600&family=Barlow+Condensed:wght@400;500;600;700&family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
