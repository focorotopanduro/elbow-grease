<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>ELBOW GREASE — Plumbing CAD</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { width: 100%; height: 100%; overflow: hidden; background: #0a0a0f; }

      /* Radial menu dead-zone pulse */
      @keyframes elbow-radial-pulse {
        0%   { transform: scale(1);    opacity: 0.3; }
        50%  { transform: scale(1.08); opacity: 0.1; }
        100% { transform: scale(1);    opacity: 0.3; }
      }

      /* Smooth scrollbar on any overflowing panels */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(0,229,255,0.4); }

      /* Suppress selection on UI overlays */
      button, .radial-menu-overlay, [data-no-select] { user-select: none; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
