    <!--
      Static LocalBusiness Schema fallback (no-JS crawlers). The runtime
      replaces this in-place with the richer @graph version mounted by
      <JsonLd id="local-business"> in CityPage.tsx. Source of truth:
      src/data/business.ts + src/data/schemas/local-business.ts.
    -->
    <script type="application/ld+json" data-jsonld-id="local-business">
    {
      "@context": "https://schema.org",
      "@type": ["LocalBusiness", "RoofingContractor", "GeneralContractor"],
      "name": "Beit Building Contractors LLC",
      "alternateName": ["BEIT BUILDING CONTRACTORS LLC", "FL Best Construction Company"],
      "url": "https://www.beitbuilding.com",
      "telephone": "+1-407-942-6459",
      "email": "beitbuilding@gmail.com",
      "image": "https://www.beitbuilding.com/og-image.jpg",
      "logo": "https://www.beitbuilding.com/logo-mark.png",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "2703 Dobbin Dr",
        "addressLocality": "Orlando",
        "addressRegion": "FL",
        "postalCode": "32817",
        "addressCountry": "US"
      },
      "geo": {
        "@type": "GeoCoordinates",
        "latitude": 28.5383,
        "longitude": -81.3792
      },
      "areaServed": ["Orlando", "Winter Park", "Oviedo", "Kissimmee", "Sanford", "Orange County", "Seminole County", "Osceola County", "Central Florida"],
      "priceRange": "$$",
      "paymentAccepted": ["Cash", "Check", "Credit Card", "Debit Card", "ACH"],
      "currenciesAccepted": "USD",
      "knowsLanguage": ["en-US", "es"],
      "openingHoursSpecification": {
        "@type": "OpeningHoursSpecification",
        "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"],
        "opens": "07:00",
        "closes": "18:00"
      },
      "identifier": [
        { "@type": "PropertyValue", "propertyID": "Florida DBPR License", "name": "Certified Roofing Contractor", "value": "CCC1337413", "validThrough": "2026-08-31" },
        { "@type": "PropertyValue", "propertyID": "Florida DBPR License", "name": "Certified General Contractor", "value": "CGC1534077", "validThrough": "2026-08-31" }
      ],
      "sameAs": []
    }
    </script>

    <!-- BreadcrumbList — static fallback for the city breadcrumb. The
         runtime version (mounted via <JsonLd id="city">) supersedes this. -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BreadcrumbList",
      "itemListElement": [
        { "@type": "ListItem", "position": 1, "name": "Home", "item": "https://www.beitbuilding.com/" },
        { "@type": "ListItem", "position": 2, "name": "Orlando Roofing & Construction", "item": "https://www.beitbuilding.com/orlando-roofing" }
      ]
    }
    </script>

    <link rel="icon" type="image/png" href="/logo-mark.png" />
