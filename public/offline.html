<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#07060a" />
    <title>Offline — Beit Building Contractors</title>
    <meta
      name="description"
      content="Offline contact page for Beit Building Contractors LLC, with direct phone access while the full website connection is unavailable."
    />
    <link rel="canonical" href="https://www.beitbuilding.com/offline.html" />
    <link rel="icon" type="image/png" href="/logo-mark.png" />
    <link rel="apple-touch-icon" href="/logo-mark.png" />
    <style>
      :root {
        --black: #07060a;
        --cream: #f5efe1;
        --gold: #d4af37;
        --gold-light: #f4d77a;
        --gray-light: #c8bfaf;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
      }
      body {
        background: var(--black);
        color: var(--cream);
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        min-height: 100vh;
        text-align: center;
      }
      .offline {
        max-width: 480px;
        padding: 32px;
        background: rgba(15, 14, 16, 0.8);
        border: 1px solid rgba(212, 175, 55, 0.3);
        border-radius: 12px;
        backdrop-filter: blur(12px);
      }
      .offline__icon {
        width: 64px;
        height: 64px;
        margin: 0 auto 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(212, 175, 55, 0.14);
        border: 1px solid rgba(212, 175, 55, 0.4);
        border-radius: 50%;
        color: var(--gold-light);
      }
      .offline__icon svg { width: 28px; height: 28px; }
      .offline__title {
        font-family: 'Cormorant Garamond', Georgia, serif;
        font-size: 28px;
        font-weight: 600;
        margin: 0 0 12px;
        letter-spacing: -0.01em;
        color: var(--cream);
      }
      .offline__lead {
        font-size: 16px;
        line-height: 1.55;
        color: var(--gray-light);
        margin: 0 0 24px;
      }
      .offline__phone {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 14px 24px;
        background: var(--gold);
        color: var(--black);
        font-weight: 600;
        font-size: 16px;
        text-decoration: none;
        border-radius: 999px;
        transition: background 0.2s ease;
      }
      .offline__phone:hover { background: var(--gold-light); }
      .offline__phone svg { width: 18px; height: 18px; }
      .offline__retry {
        display: block;
        margin-top: 20px;
        padding: 10px 20px;
        background: transparent;
        color: var(--gold-light);
        border: 1px solid rgba(212, 175, 55, 0.4);
        border-radius: 999px;
        font-family: inherit;
        font-size: 12px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        font-weight: 600;
        cursor: pointer;
        text-align: center;
        text-decoration: none;
      }
      .offline__retry:hover {
        background: rgba(212, 175, 55, 0.12);
      }
      .offline__brand {
        margin-top: 32px;
        font-family: 'Barlow Condensed', sans-serif;
        font-size: 11px;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: rgba(245, 239, 225, 0.45);
      }
    </style>
  </head>
  <body>
    <main class="offline">
      <div class="offline__icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="1" y1="1" x2="23" y2="23"></line>
          <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path>
          <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path>
          <path d="M10.71 5.05A16 16 0 0 1 22.58 9"></path>
          <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path>
          <line x1="12" y1="20" x2="12.01" y2="20"></line>
        </svg>
      </div>
      <h1 class="offline__title">You're offline</h1>
      <p class="offline__lead">
        Looks like your connection dropped. The internet is required for
        full site functionality, but you can still reach us by phone.
      </p>
      <a href="tel:+14079426459" class="offline__phone">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" />
        </svg>
        Call (407) 942-6459
      </a>
      <a href="/" class="offline__retry">Try again</a>
      <p class="offline__brand">Beit Building Contractors LLC</p>
    </main>
  </body>
</html>
