    <!-- ╔═══════════ SECURITY HEADERS (HTTP-EQUIV equivalents) ═══════════╗
         These meta tags supplement the HTTP headers configured in
         vercel.json (which is the canonical place for response-level
         security policy). HTTP headers ALWAYS win over meta-equivs but
         the meta versions are defense-in-depth: they apply even if a
         CDN strips a header, and they apply to file:// protocol too.
         ╚══════════════════════════════════════════════════════════════╝ -->

    <!-- CONTENT SECURITY POLICY — first-party only. Removed Google +
         Meta whitelist entries in the privacy pivot since this site
         no longer loads gtag/fbq trackers. The TIGHTER whitelist
         doubles as a code-level enforcement: any future attempt to
         re-add a third-party tracker would be BLOCKED by the browser
         (script-src would refuse to load it) until someone explicitly
         loosens this policy — which forces a code-review conversation.
         The whitelist now matches ONLY what the site actually uses:
           * Vite chunks served from same origin (self)
           * Google Fonts (CSS + WOFF2) — fonts only, no tracking
           * Inline JSON-LD scripts (need 'unsafe-inline' for type=application/ld+json)
         Production CSP also served via header in vercel.json for tighter control. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="
        default-src 'self';
        script-src 'self' 'unsafe-inline';
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src 'self' https://fonts.gstatic.com;
        img-src 'self' data:;
        connect-src 'self';
        frame-ancestors 'none';
        base-uri 'self';
        form-action 'self' mailto:;
        object-src 'none';
        upgrade-insecure-requests;
      "
    />

    <!-- REFERRER POLICY — when the browser navigates away from this
         page (or loads cross-origin assets), strip query strings + path
         from the Referer header. Prevents leaking URL params that might
         contain PII to third parties. -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- PERMISSIONS POLICY — disable browser features we don't use.
         If a third-party script gets injected, it can't fingerprint
         the user via camera/mic/geolocation/etc. -->
    <meta
      http-equiv="Permissions-Policy"
      content="
        camera=(),
        microphone=(),
        geolocation=(),
        payment=(),
        usb=(),
        magnetometer=(),
        gyroscope=(),
        accelerometer=(),
        autoplay=(self),
        fullscreen=(self),
        picture-in-picture=()
      "
    />

    <!-- X-CONTENT-TYPE-OPTIONS — prevents the browser from MIME-
         sniffing a response away from the declared content-type.
         Mitigates an attack where a malicious upload could be
         served as HTML/JS even if the server says it's an image. -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
